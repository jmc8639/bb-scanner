name: Daily Scan

# Schedule: run at 22:00 UTC Monday-Friday (5pm ET during DST, 4pm ET in winter — runs after US market close year-round)
on:
  schedule:
    - cron: "0 22 * * 1-5"
  # Allow manual triggering via the Actions tab, with optional diagnostic ticker
  workflow_dispatch:
    inputs:
      diagnostic_ticker:
        description: "Optional: ticker to produce a detailed diagnostic dump for (e.g., FXI)"
        required: false
        default: ""

jobs:
  scan:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # needed to commit the daily report back to the repo

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run the scanner
        env:
          DIAGNOSTIC_TICKER: ${{ inputs.diagnostic_ticker }}
        run: python scanner.py

      - name: Commit the report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          git diff --cached --quiet || git commit -m "Daily scan report $(date -u +%Y-%m-%d)"
          git push
